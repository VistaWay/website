<!DOCTYPE html>
<html lang="en">
<body style="background-color: papayawhip;"
<head>
  <meta charset="UTF-8">
  <title>Zoomable Image Gallery</title>
  <style>
    body {
      font-family: 
      margin: 0;
      background: #111;
      color: #000000;
      text-align: center;
    }

    h1 {
      padding: 20px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
      padding: 20px;
    }

    .gallery img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      cursor: pointer;
      border-radius: 8px;
      transition: 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      z-index: 999;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      overflow: hidden;
    }

    .lightbox.active {
      display: block;
    }

    .lightbox img {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1);
      max-width: none;
      max-height: none;
      cursor: grab;
      user-select: none;
    }

    .close {
      position: absolute;
      top: 20px;
      right: 40px;
      font-size: 40px;
      color: black;
      cursor: pointer;
      z-index: 1000;
    }
  </style>
</head>

<body>

<h1>Apartment Photos</h1>

<div class="gallery">
  <img src="images\20.jpg" alt="Vista Way living room">
<img src="images\21.jpg" alt="">
<img src="images\22.jpg" alt="Vista Way laundry area">
<img src="images\23.jpg" alt="Vista Way laundry area">
<img src="images\24.jpg" alt="">
<img src="images\25.jpg" alt="">
<img src="images\26.jpg" alt="">
<img src="images\27.jpg" alt="Vista Way Living Room">
<img src="images\vista way kitchen.jpg" alt="vista way kitchen">
<img src="images\28.jpg" alt="Vista Way night time">
<img src="images\45645.jpg" alt="Vista Way Bedroom">
<img src="images\29.jpg" alt="">
<img src="images\30.jpg" alt="">
<img src="images\31.jpg" alt="">
</div>

<div id="lightbox" class="lightbox">
  <span class="close" onclick="closeLightbox()">&times;</span>

  <!-- Next / Previous Buttons -->
  <span class="nav prev" onclick="changeImage(-1)">&#10094;</span>
  <span class="nav next" onclick="changeImage(1)">&#10095;</span>

  <img id="lightbox-img">
</div>

<script>
  const lightbox = document.getElementById('lightbox');
  const img = document.getElementById('lightbox-img');

  let scale = 1;
  let pos = { x: 0, y: 0 };
  let isDragging = false;
  let start = { x: 0, y: 0 };

  function openLightbox(el) {
    lightbox.classList.add('active');
    img.src = el.src;

    // reset
    scale = 1;
    pos = { x: 0, y: 0 };
    updateTransform();
  }

  function closeLightbox() {
    lightbox.classList.remove('active');
  }

  function updateTransform() {
    img.style.transform =
      `translate(calc(-50% + ${pos.x}px), calc(-50% + ${pos.y}px)) scale(${scale})`;
  }

  // Zoom with scroll wheel
  lightbox.addEventListener('wheel', (e) => {
    e.preventDefault();

    const zoomSpeed = 0.1;
    scale += e.deltaY * -zoomSpeed * 0.01;

    // limits
    scale = Math.min(Math.max(0.5, scale), 5);

    updateTransform();
  });

  // Drag to pan
  img.addEventListener('mousedown', (e) => {
    isDragging = true;
    img.style.cursor = 'grabbing';
    start.x = e.clientX - pos.x;
    start.y = e.clientY - pos.y;
  });

  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;

    pos.x = e.clientX - start.x;
    pos.y = e.clientY - start.y;

    updateTransform();
  });

  window.addEventListener('mouseup', () => {
    isDragging = false;
    img.style.cursor = 'grab';
  });

  // Close on background click
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) closeLightbox();
  });
</script>

</body>
</html>
